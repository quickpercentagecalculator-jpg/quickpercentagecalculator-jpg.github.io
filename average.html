<!DOCTYPE html>
<html>
<head>
<title>Average Calculator</title>
</head>

<body style="font-family:Arial;text-align:center;padding:40px;">

<h1>Average Calculator</h1>

<input id="n1" placeholder="Number 1"><br><br>
<input id="n2" placeholder="Number 2"><br><br>
<input id="n3" placeholder="Number 3"><br><br>

<button onclick="calc()">Calculate</button>

<h2 id="result"></h2>

<script>

function calc(){

let a=parseFloat(document.getElementById("n1").value);
let b=parseFloat(document.getElementById("n2").value);
let c=parseFloat(document.getElementById("n3").value);

let avg=(a+b+c)/3;

document.getElementById("result").innerHTML=
"Average = "+avg;

}

</script>

</body>
</html>
